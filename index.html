<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Euroway Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #0A1A2F;
      color: #FFFFFF;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background: #0D223A;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid #123456;
    }

    .sidebar h1 {
      font-size: 22px;
      margin: 0 0 10px 0;
      font-weight: 600;
      color: #1E90FF;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #FFFFFF;
      text-align: left;
      padding: 12px 10px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .nav-btn.active {
      background: #1E90FF;
      color: #FFFFFF;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 50px;
    }

    h2 {
      margin-top: 0;
      font-size: 26px;
      font-weight: 600;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .home-title {
      font-size: 70px;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      margin-top: 150px;
    }

    .card {
      background: #0D223A;
      border: 1px solid #123456;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #1E3A5F;
      background: #071524;
      color: #FFFFFF;
      font-size: 14px;
      margin-bottom: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn-primary {
      background: #1E90FF;
      color: white;
    }

    .btn-danger {
      background: #C62828;
      color: white;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
    }

    img.fleet-image {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h1>Euroway</h1>
    <button class="nav-btn active" data-tab="home">Home</button>
    <button class="nav-btn" data-tab="drivers">Drivers</button>
    <button class="nav-btn" data-tab="fleet">Fleet</button>
    <button class="nav-btn" data-tab="ranking">Ranking</button>
    <button class="nav-btn" data-tab="admin">Admin</button>
  </div>

  <main>

    <section id="home" class="section active">
      <div class="home-title">EUROWAY</div>
    </section>

    <section id="drivers" class="section">
      <h2>Drivers</h2>
      <div class="card">
        <select id="driverSelect"></select>
      </div>

      <button id="deleteAllBtn" class="btn btn-danger btn-small" style="display:none;" onclick="deleteAllMessagesForDriver()">Delete all messages for this driver</button>

      <div id="driverInbox"></div>
    </section>

    <section id="fleet" class="section">
      <h2>Fleet</h2>
      <div id="fleetList"></div>
    </section>

    <section id="ranking" class="section">
      <h2>Ranking</h2>
      <div id="rankingList"></div>
    </section>

    <section id="admin" class="section">
      <h2>Admin</h2>

      <div id="adminLocked" class="card">
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn btn-primary" id="adminLoginBtn">Unlock</button>
      </div>

      <div id="adminPanel" style="display:none;">

        <div class="card">
          <input id="newDriverName" placeholder="Driver name">
          <button class="btn btn-primary" id="addDriverBtn">Add</button>
        </div>

        <div class="card">
          <div id="adminDriversList"></div>
        </div>

        <div class="card">
          <select id="msgDriverSelect"></select>
          <input id="msgTitle" placeholder="Title">
          <textarea id="msgBody" placeholder="Message"></textarea>
          <button class="btn btn-primary" id="sendMsgBtn">Send</button>
        </div>

        <div class="card">
          <div id="adminMessagesList"></div>
        </div>

        <div class="card">
          <textarea id="fleetText" placeholder="Text"></textarea>
          <input id="fleetImageUrl" placeholder="Image URL">
          <button class="btn btn-primary" id="addFleetBtn">Add</button>
        </div>

        <div class="card">
          <div id="adminFleetList"></div>
        </div>

        <div class="card">
          <select id="rankDriverSelect"></select>
          <input id="rankKm" type="number" placeholder="Kilometers">
          <button class="btn btn-primary" id="addRankBtn">Save</button>
        </div>

        <div class="card">
          <div id="adminRankingList"></div>
        </div>

        <!-- ⭐ DELETE DRIVER + INBOX -->
        <div class="card">
          <h3>Delete Driver</h3>
          <select id="deleteDriverSelect"></select>
          <button class="btn btn-danger" onclick="deleteDriverAndInbox()">Delete driver + inbox</button>
        </div>

      </div>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCPsIyA6OnFBiQuH9abfto9JRIZZTmTMTo",
    authDomain: "eurowayportalv2.firebaseapp.com",
    projectId: "eurowayportalv2",
    storageBucket: "eurowayportalv2.firebasestorage.app",
    messagingSenderId: "781209873831",
    appId: "1:781209873831:web:efb5cf246037cebf559a82",
    measurementId: "G-LBQ84DWJPE"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  window.isAdmin = false;

  /* TAB SWITCHING */
  const buttons = document.querySelectorAll(".nav-btn");
  const sections = document.querySelectorAll(".section");

  buttons.forEach(btn => {
    btn.onclick = () => {
      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sections.forEach(s => s.classList.remove("active"));
      document.getElementById(btn.dataset.tab).classList.add("active");
    };
  });

  /* ADMIN LOGIN */
  const adminPassword = "321321";

  document.getElementById("adminLoginBtn").onclick = () => {
    if (document.getElementById("adminPassword").value === adminPassword) {
      window.isAdmin = true;
      document.getElementById("adminLocked").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      document.getElementById("deleteAllBtn").style.display = "inline-block";

      loadAdminMessages();
      loadDeleteDriverList();
      loadInbox();
    }
  };

  /* LOAD DRIVERS */
  async function loadDrivers() {
    const snap = await db.collection("drivers").get();
    const driverSelect = document.getElementById("driverSelect");
    const msgDriverSelect = document.getElementById("msgDriverSelect");
    const rankDriverSelect = document.getElementById("rankDriverSelect");

    driverSelect.innerHTML = "";
    msgDriverSelect.innerHTML = "";
    rankDriverSelect.innerHTML = "";

    snap.forEach(doc => {
      const name = doc.data().name;
      driverSelect.innerHTML += `<option>${name}</option>`;
      msgDriverSelect.innerHTML += `<option>${name}</option>`;
      rankDriverSelect.innerHTML += `<option>${name}</option>`;
    });

    loadInbox();
  }

  document.getElementById("addDriverBtn").onclick = async () => {
    const name = document.getElementById("newDriverName").value;
    if (!name) return;
    await db.collection("drivers").add({ name });
    loadDrivers();
    loadDeleteDriverList();
  };

  /* LOAD INBOX */
  async function loadInbox() {
    const driver = document.getElementById("driverSelect").value;
    const snap = await db.collection("messages").get();
    const inbox = document.getElementById("driverInbox");
    inbox.innerHTML = "";

    snap.forEach(doc => {
      const m = doc.data();

      let deleteBtn = "";
      if (window.isAdmin === true) {
        deleteBtn = `<button class="btn btn-danger btn-small" onclick="deleteMessage('${doc.id}')">Delete</button>`;
      }

      if (m.driver === driver) {
        inbox.innerHTML += `
          <div class="card">
            <h3>${m.title}</h3>
            <p>${m.body}</p>
            ${deleteBtn}
          </div>
        `;
      }
    });
  }

  document.getElementById("driverSelect").onchange = loadInbox;

  /* SEND MESSAGE */
  document.getElementById("sendMsgBtn").onclick = async () => {
    await db.collection("messages").add({
      driver: document.getElementById("msgDriverSelect").value,
      title: document.getElementById("msgTitle").value,
      body: document.getElementById("msgBody").value
    });
    loadAdminMessages();
    loadInbox();
  };

  /* ADMIN MESSAGES */
  async function loadAdminMessages() {
    const snap = await db.collection("messages").get();
    const list = document.getElementById("adminMessagesList");
    list.innerHTML = "";

    snap.forEach(doc => {
      const m = doc.data();
      list.innerHTML += `
        <div class="card">
          <h3>${m.title}</h3>
          <p>${m.body}</p>
          <p><b>${m.driver}</b></p>
          <button class="btn btn-danger btn-small" onclick="deleteMessage('${doc.id}')">Delete</button>
        </div>
      `;
    });
  }

  window.deleteMessage = async (id) => {
    await db.collection("messages").doc(id).delete();
    loadAdminMessages();
    loadInbox();
  };

  /* DELETE ALL MESSAGES FOR DRIVER */
  window.deleteAllMessagesForDriver = async () => {
    const driver = document.getElementById("driverSelect").value;
    const snap = await db.collection("messages").where("driver", "==", driver).get();

    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    loadAdminMessages();
    loadInbox();
  };

  /* FLEET */
  async function loadFleet() {
    const snap = await db.collection("fleet").get();
    const list = document.getElementById("fleetList");
    const adminList = document.getElementById("adminFleetList");

    list.innerHTML = "";
    adminList.innerHTML = "";

    snap.forEach(doc => {
      const f = doc.data();

      list.innerHTML += `
        <div class="card">
          <p>${f.text}</p>
          <img class="fleet-image" src="${f.image}">
        </div>
      `;

      adminList.innerHTML += `
        <div class="card">
          <p>${f.text}</p>
          <button class="btn btn-danger btn-small" onclick="deleteFleet('${doc.id}')">Delete</button>
        </div>
      `;
    });
  }

  window.deleteFleet = async (id) => {
    await db.collection("fleet").doc(id).delete();
    loadFleet();
  };

  document.getElementById("addFleetBtn").onclick = async () => {
    await db.collection("fleet").add({
      text: document.getElementById("fleetText").value,
      image: document.getElementById("fleetImageUrl").value
    });
    loadFleet();
  };

  /* RANKING */
  async function loadRanking() {
    const snap = await db.collection("ranking").get();
    const list = document.getElementById("rankingList");
    const adminList = document.getElementById("adminRankingList");

    list.innerHTML = "";
    adminList.innerHTML = "";

    snap.forEach(doc => {
      const r = doc.data();

      list.innerHTML += `
        <div class="card">
          <p>${r.driver}: ${r.km} km</p>
        </div>
      `;

      adminList.innerHTML += `
        <div class="card">
          <p>${r.driver}: ${r.km} km</p>
          <button class="btn btn-danger btn-small" onclick="deleteRank('${doc.id}')">Delete</button>
        </div>
      `;
    });
  }

  window.deleteRank = async (id) => {
    await db.collection("ranking").doc(id).delete();
    loadRanking();
  };

  document.getElementById("addRankBtn").onclick = async () => {
    await db.collection("ranking").add({
      driver: document.getElementById("rankDriverSelect").value,
      km: Number(document.getElementById("rankKm").value)
    });
    loadRanking();
  };

  /* ⭐ LOAD DRIVER LIST FOR DELETE DROPDOWN */
  async function loadDeleteDriverList() {
    const snap = await db.collection("drivers").get();
    const select = document.getElementById("deleteDriverSelect");
    select.innerHTML = "";

    snap.forEach(doc => {
      const name = doc.data().name;
      select.innerHTML += `<option value="${doc.id}">${name}</option>`;
    });
  }

  /* ⭐ DELETE DRIVER + INBOX */
  window.deleteDriverAndInbox = async () => {
    const driverId = document.getElementById("deleteDriverSelect").value;

    const driverDoc = await db.collection("drivers").doc(driverId).get();
    const driverName = driverDoc.data().name;

    await db.collection("drivers").doc(driverId).delete();

    const snap = await db.collection("messages").where("driver", "==", driverName).get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    loadDrivers();
    loadAdminMessages();
    loadDeleteDriverList();
    loadInbox();
  };

  /* INITIAL LOAD */
  loadDrivers();
  loadFleet();
  loadRanking();
  loadAdminMessages();
  loadDeleteDriverList();
</script>

</body>
</html>
