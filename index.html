<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Euroway VTC Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Montserrat font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #0A1A2F;
      color: #FFFFFF;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #0D223A;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid #123456;
    }

    .sidebar h1 {
      font-size: 22px;
      margin: 0 0 10px 0;
      font-weight: 600;
      color: #1E90FF;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #FFFFFF;
      text-align: left;
      padding: 12px 10px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .nav-btn.active {
      background: #1E90FF;
      color: #FFFFFF;
    }

    /* MAIN CONTENT */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 40px 50px;
    }

    h2 {
      margin-top: 0;
      font-size: 26px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* CARDS */
    .card {
      background: #0D223A;
      border: 1px solid #123456;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    /* INPUTS */
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #1E3A5F;
      background: #071524;
      color: #FFFFFF;
      font-size: 14px;
      margin-bottom: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn-primary {
      background: #1E90FF;
      color: white;
    }

    .btn-primary:hover {
      background: #1877D3;
    }

    .btn-danger {
      background: #C62828;
      color: white;
    }

    .btn-danger:hover {
      background: #A61F1F;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
    }

    img.fleet-image {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1>Euroway VTC</h1>
    <button class="nav-btn active" data-tab="home">Home</button>
    <button class="nav-btn" data-tab="drivers">Drivers Inbox</button>
    <button class="nav-btn" data-tab="fleet">Fleet</button>
    <button class="nav-btn" data-tab="ranking">Ranking</button>
    <button class="nav-btn" data-tab="admin">Admin</button>
  </div>

  <!-- MAIN CONTENT -->
  <main>

    <!-- HOME -->
    <section id="home" class="section active">
      <h2>Welcome</h2>
      <p>This is the official Euroway VTC Portal for drivers, fleet updates and rankings.</p>
    </section>

    <!-- DRIVERS -->
    <section id="drivers" class="section">
      <h2>Drivers Inbox</h2>
      <div class="card">
        <label>Select your name</label>
        <select id="driverSelect"></select>
      </div>
      <div id="driverInbox"></div>
    </section>

    <!-- FLEET -->
    <section id="fleet" class="section">
      <h2>Fleet</h2>
      <div id="fleetList"></div>
    </section>

    <!-- RANKING -->
    <section id="ranking" class="section">
      <h2>Driver Ranking</h2>
      <div id="rankingList"></div>
    </section>

    <!-- ADMIN -->
    <section id="admin" class="section">
      <h2>Admin Panel</h2>

      <div id="adminLocked" class="card">
        <label>Admin password</label>
        <input type="password" id="adminPassword">
        <button class="btn btn-primary" id="adminLoginBtn">Unlock</button>
      </div>

      <div id="adminPanel" style="display:none;">

        <!-- DRIVERS -->
        <div class="card">
          <h3>Add Driver</h3>
          <input id="newDriverName" placeholder="Driver name">
          <button class="btn btn-primary" id="addDriverBtn">Add</button>
        </div>

        <div class="card">
          <h3>Drivers</h3>
          <div id="adminDriversList"></div>
        </div>

        <!-- MESSAGES -->
        <div class="card">
          <h3>Send Message</h3>
          <label>Driver</label>
          <select id="msgDriverSelect"></select>

          <label>Title</label>
          <input id="msgTitle">

          <label>Message</label>
          <textarea id="msgBody"></textarea>

          <button class="btn btn-primary" id="sendMsgBtn">Send</button>
        </div>

        <!-- FLEET -->
        <div class="card">
          <h3>Add Fleet Item</h3>
          <label>Description</label>
          <textarea id="fleetText"></textarea>

          <label>Image URL</label>
          <input id="fleetImageUrl">

          <button class="btn btn-primary" id="addFleetBtn">Add</button>
        </div>

        <div class="card">
          <h3>Fleet Items</h3>
          <div id="adminFleetList"></div>
        </div>

        <!-- RANKING -->
        <div class="card">
          <h3>Update Ranking</h3>
          <label>Driver</label>
          <select id="rankDriverSelect"></select>

          <label>Kilometers</label>
          <input id="rankKm" type="number">

          <button class="btn btn-primary" id="addRankBtn">Save</button>
        </div>

        <div class="card">
          <h3>Ranking Entries</h3>
          <div id="adminRankingList"></div>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
