<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euroway Driver Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase compat scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // 🔹 Firebase configuration
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // 🔹 Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 🔹 Load inbox messages
    async function loadInbox() {
      const inboxContainer = document.getElementById("inboxContainer");
      const inboxEmpty = document.getElementById("inboxEmpty");
      const msgDetail = document.getElementById("msgDetail");
      const msgDetailSubject = document.getElementById("msgDetailSubject");
      const msgDetailBody = document.getElementById("msgDetailBody");
      const msgDetailMeta = document.getElementById("msgDetailMeta");
      const msgBack = document.getElementById("msgBack");

      try {
        const snap = await db.collection("messages").orderBy("createdAt", "desc").get();

        if (snap.empty) {
          inboxEmpty.textContent = "No messages yet.";
          return;
        }

        inboxEmpty.textContent = "";
        inboxContainer.innerHTML = "";

        snap.forEach(doc => {
          const data = doc.data();
          const card = document.createElement("button");
          card.className =
            "w-full text-left bg-slate-800 border border-slate-700 hover:border-amber-400 rounded-lg p-4 flex flex-col gap-1";

          const created = data.createdAt?.toDate ? data.createdAt.toDate() : null;
          const dateStr = created ? created.toLocaleString() : "Unknown time";

          card.innerHTML = `
            <div class="flex justify-between items-center">
              <span class="font-semibold text-sm">${data.subject || "(no subject)"}</span>
              <span class="text-xs text-slate-400">${dateStr}</span>
            </div>
            <p class="text-xs text-slate-400">From: Admin</p>
            <p class="text-xs text-slate-200 line-clamp-2">${data.body || ""}</p>
          `;

          card.addEventListener("click", () => {
            msgDetailSubject.textContent = data.subject || "(no subject)";
            msgDetailBody.textContent = data.body || "";
            msgDetailMeta.textContent = `From: Admin • ${dateStr}`;
            inboxContainer.classList.add("hidden");
            msgDetail.classList.remove("hidden");
          });

          inboxContainer.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        inboxEmpty.textContent = "Error loading messages.";
      }

      msgBack.addEventListener("click", () => {
        msgDetail.classList.add("hidden");
        inboxContainer.classList.remove("hidden");
      });
    }

    // 🔹 Initialize portal
    window.onload = loadInbox;
  </script>
</head>

<body class="bg-slate-900 text-white p-6">
  <h1 class="text-2xl font-bold mb-4">Euroway Driver Portal</h1>

  <div id="inboxContainer"></div>
  <p id="inboxEmpty" class="text-slate-400"></p>

  <div id="msgDetail" class="hidden">
    <button id="msgBack" class="mb-4 text-amber-400 hover:text-amber-300">← Back</button>
    <h2 id="msgDetailSubject" class="text-lg font-bold"></h2>
    <p id="msgDetailMeta" class="text-xs text-slate-400 mb-2"></p>
    <p id="msgDetailBody" class="text-sm"></p>
  </div>
</body>
</html>
